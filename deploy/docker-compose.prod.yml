# Docker Compose — 生产/共享服务器（仅本机监听，避免与宝塔/Nacos 冲突）
# 用法：cd /opt/inbound-growth/deploy && docker compose -f docker-compose.prod.yml --env-file .env up -d

version: "3.9"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: inbound-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inbound_growth}
      POSTGRES_USER: ${POSTGRES_USER:-inbound}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/ddl/001_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ../database/ddl/002_seed_demo.sql:/docker-entrypoint-initdb.d/02_seed_demo.sql:ro
      - ./init/03_langfuse_db.sql:/docker-entrypoint-initdb.d/03_langfuse_db.sql:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inbound} -d ${POSTGRES_DB:-inbound_growth}"]

  # 宿主机 6379 已被宝塔 Redis 占用，映射到 6380
  redis:
    image: redis:7-alpine
    container_name: inbound-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]

  minio:
    image: minio/minio:latest
    container_name: inbound-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-inbound_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: inbound-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-inbound}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]

  # 宿主机 3000 已被 Nginx 占用，映射到 3100
  langfuse:
    image: langfuse/langfuse:2
    container_name: inbound-langfuse
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-inbound}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET required}
      SALT: ${SALT:?SALT required}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://127.0.0.1:3100}
      TELEMETRY_ENABLED: "false"
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      postgres:
        condition: service_healthy

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: inbound-gotenberg
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:

networks:
  default:
    name: inbound-network
